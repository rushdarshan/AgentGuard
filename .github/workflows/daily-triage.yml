name: Daily Triage

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Record run start
        id: timing
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          npm test 2>&1 | tee /tmp/test-output.txt
          if grep -q "Tests.*failed" /tmp/test-output.txt; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Check open issues
        id: issues
        run: |
          OPEN=$(gh issue list --limit 1 --json number -q 'length')
          UNTRIAGED=$(gh issue list --label "needs-triage" --limit 1 --json number -q 'length' 2>/dev/null || echo "0")
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"
          echo "untriaged=$UNTRIAGED" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check failing CI
        id: ci
        run: |
          FAILING=0
          for wf in agentguard-ci; do
            STATUS=$(gh run list --workflow="${wf}.yml" --branch main --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "failure" ]; then FAILING=$((FAILING + 1)); fi
          done
          echo "failing=$FAILING" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update STATE.md
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TEST_STATUS="${{ steps.tests.outputs.status }}"
          OPEN_ISSUES="${{ steps.issues.outputs.open }}"
          FAILING_CI="${{ steps.ci.outputs.failing }}"

          cat > STATE.md <<EOF
          # Loop State — AgentGuard

          Last run: ${DATE} (automated daily-triage workflow)

          ## High Priority

          $(if [ "$TEST_STATUS" != "pass" ]; then echo "- **Tests failing** — investigate immediately."; fi)
          $(if [ "$FAILING_CI" -gt 0 ]; then echo "- **${FAILING_CI}** CI workflow(s) failing on main."; fi)
          $(if [ "$OPEN_ISSUES" -gt 0 ] && [ "$OPEN_ISSUES" != "0" ]; then echo "- ${OPEN_ISSUES} open issue(s) — triage needed."; fi)
          $(if [ "$TEST_STATUS" = "pass" ] && [ "$FAILING_CI" = "0" ] && { [ "$OPEN_ISSUES" = "0" ] || [ "$OPEN_ISSUES" = "" ]; }; then echo "- All clear — no action required."; fi)

          ## Watch List

          - Pre-existing TS errors in src/_core/neo4j.ts, proxy.ts
          - loop-audit score: run \`npx @cobusgreyling/loop-audit . --suggest\` locally

          ## Recent Noise

          —

          ---
          Run log: Updated by daily-triage.yml workflow.
          EOF

      - name: Append loop-run-log.md
        run: |
          START="${{ steps.timing.outputs.started_at }}"
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DURATION=$(node -e "
            const s = new Date('${START}').getTime();
            const e = new Date('${END}').getTime();
            console.log(Math.max(1, Math.round((e - s) / 1000)));
          ")
          TEST_STATUS="${{ steps.tests.outputs.status }}"
          FAILING_CI="${{ steps.ci.outputs.failing }}"
          if [ "$TEST_STATUS" != "pass" ] || [ "$FAILING_CI" -gt 0 ]; then
            OUTCOME="escalated"
          else
            OUTCOME="report-only"
          fi
          ENTRY=$(node -e "
            console.log(JSON.stringify({
              run_id: '${END}',
              pattern: 'daily-triage',
              duration_s: Number('${DURATION}'),
              items_found: 0,
              actions_taken: 1,
              escalations: Number('${FAILING_CI}'),
              tokens_estimate: 0,
              outcome: '${OUTCOME}',
              workflow_run: '${{ github.run_id }}'
            }));
          ")
          echo "| ${END%T*} | daily-triage | 0 | 1 | ${FAILING_CI} | 0 | ${OUTCOME} |" >> loop-run-log.md

      - name: Open PR for state updates
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet STATE.md loop-run-log.md; then
            echo "No changes — skip PR"
            echo "opened=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="automated/daily-triage-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add STATE.md loop-run-log.md
          git commit -m "chore(loop): daily triage update STATE.md + run log [automated]"
          git push -u origin "$BRANCH" --force

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(loop): daily triage $(date -u +%Y-%m-%d)" \
            --body "Automated daily triage update.

          - Tests: ${{ steps.tests.outputs.status }}
          - Open issues: ${{ steps.issues.outputs.open }}
          - Failing CI: ${{ steps.ci.outputs.failing }}
          " \
            --label "loop-report" \
            --auto
