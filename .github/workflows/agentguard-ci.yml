name: AgentGuard CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  agentguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AgentGuard
        uses: ./.github/actions/agentguard
        with:
          url: ${{ secrets.AGENT_URL || 'http://localhost:8080' }}
          threshold: 80
